<!-- ========================================================
     RSVP COMPONENT - "THE FLOATING GLASS TICKET"
     ======================================================== -->

<style>
    /* ======================================================
       1. MAIN SECTION & AMBIENT BACKGROUND
       ====================================================== */
    .rsvp-section {
        position: relative; width: 100vw; min-height: 100vh;
        display: flex; justify-content: center; align-items: center;
        background: radial-gradient(circle at center, #0a0e14 0%, #010204 100%);
        padding: clamp(60px, 10vh, 120px) 5%;
        overflow: hidden;
    }

    /* Ambient back glow behind the glass card */
    .rsvp-glow {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: clamp(300px, 60vw, 700px); height: clamp(400px, 60vh, 700px);
        background: radial-gradient(circle, rgba(212, 163, 115, 0.1) 0%, transparent 70%);
        filter: blur(50px); pointer-events: none; z-index: 1;
    }

    /* ======================================================
       2. THE FROSTED GLASS TICKET (Form Container)
       ====================================================== */
    .rsvp-glass-card {
        position: relative; z-index: 10;
        width: 100%; max-width: 650px;
        background: rgba(255, 255, 255, 0.02); /* Almost invisible */
        backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); /* Premium Frost */
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-top: 1px solid rgba(212, 163, 115, 0.4);
        border-radius: 20px;
        padding: clamp(30px, 5vw, 60px) clamp(20px, 4vw, 50px);
        box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
        
        /* Observer reveal animation */
        opacity: 0; transform: translateY(60px) scale(0.95); filter: blur(10px);
        transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .rsvp-glass-card.reveal { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }

    /* The Embellished Top Crest */
    .rsvp-crest { text-align: center; margin-bottom: 40px; }
    .rsvp-crest svg { width: 40px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); margin-bottom: 10px; }
    .rsvp-crest h2 { font-family: 'Great Vibes', cursive; font-size: clamp(3rem, 5vw, 4rem); color: #ebd197; line-height: 1; margin: 0; }
    .rsvp-crest p { font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 4px; color: #a0aec0; text-transform: uppercase; margin-top: 10px; }

    /* ======================================================
       3. LUXURY INPUT FIELDS (Floating Labels)
       ====================================================== */
    .input-group { position: relative; margin-bottom: 30px; width: 100%; }
    
    .magic-input {
        width: 100%; padding: 15px 0 10px 0;
        background: transparent; border: none; border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff; font-family: 'Montserrat', sans-serif; font-size: 1rem;
        outline: none; transition: border-color 0.3s, box-shadow 0.3s;
        border-radius: 0; /* Prevents iOS rounding */
    }
    .magic-textarea { resize: none; min-height: 40px; }
    
    /* Glowing base line on focus */
    .magic-input:focus { border-bottom-color: #d4a373; box-shadow: 0 5px 15px -10px rgba(212, 163, 115, 0.5); }
    
    .floating-label {
        position: absolute; left: 0; top: 12px;
        color: #64748b; font-family: 'Montserrat', sans-serif; font-size: 0.95rem; font-weight: 300;
        pointer-events: none; transition: all 0.3s ease;
    }
    
    /* Float logic: If input is focused OR has placeholder-shown trick activated */
    .magic-input:focus ~ .floating-label,
    .magic-input:not(:placeholder-shown) ~ .floating-label {
        top: -12px; font-size: 0.7rem; color: #d4a373; letter-spacing: 2px; font-weight: 500;
    }

    /* ======================================================
       4. INTERACTIVE TILES (Replacing Ugly Select Dropdowns)
       ====================================================== */
    .lbl-title { font-family: 'Cinzel', serif; font-size: 0.8rem; color: #cbd5e1; letter-spacing: 2px; margin-bottom: 15px; display: block; text-transform: uppercase; }

    /* The Attend Choices */
    .choice-grid { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
    .choice-box { flex: 1; min-width: 120px; position: relative; }
    .choice-box input[type="radio"] { display: none; }
    
    .choice-label {
        display: block; padding: 18px 10px; text-align: center; border-radius: 8px; cursor: pointer;
        background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
        font-family: 'Montserrat', sans-serif; font-size: 0.85rem; color: #94a3b8; font-weight: 400;
        transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    
    /* Hover & Checked state (Glow effect) */
    .choice-box input[type="radio"]:checked + .choice-label {
        background: rgba(212, 163, 115, 0.1); border-color: #d4a373;
        color: #ffeba1; text-shadow: 0 0 10px rgba(255,235,161,0.5);
        box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 15px rgba(212, 163, 115, 0.15);
        transform: translateY(-3px);
    }

    /* Guest Counter Circular Toggles */
    .guest-counter-grid { display: flex; gap: 10px; margin-bottom: 35px; flex-wrap: wrap; }
    .guest-circle { position: relative; }
    .guest-circle input[type="radio"] { display: none; }
    
    .guest-label {
        width: 50px; height: 50px; display: flex; justify-content: center; align-items: center;
        border-radius: 50%; cursor: pointer; background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; font-family: 'Cinzel', serif; font-size: 1rem;
        transition: all 0.3s ease;
    }
    .guest-circle input[type="radio"]:checked + .guest-label {
        background: #d4a373; color: #050a11; font-weight: 600;
        border-color: #ffeba1; box-shadow: 0 5px 15px rgba(212, 163, 115, 0.4);
        transform: scale(1.1);
    }

    /* ======================================================
       5. MAGICAL SUBMIT BUTTON
       ====================================================== */
    .submit-wrap { text-align: center; margin-top: 10px; position: relative; }
    
    .btn-gold-solid {
        width: 100%; padding: 18px 0; border-radius: 8px; border: none; cursor: pointer;
        background: linear-gradient(135deg, #d4a373 0%, #b68d40 100%);
        color: #010204; font-family: 'Cinzel', serif; font-size: 0.95rem; font-weight: 600; letter-spacing: 3px;
        transition: all 0.3s; position: relative; overflow: hidden;
        box-shadow: 0 10px 30px rgba(182, 141, 64, 0.3);
    }
    
    .btn-gold-solid::before {
        content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.5), transparent);
        transform: skewX(-20deg); transition: all 0.5s ease;
    }
    
    .btn-gold-solid:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(182, 141, 64, 0.5); }
    .btn-gold-solid:hover::before { left: 150%; transition: all 0.7s ease; }
</style>

<!-- ========================================================
     JS LOGIC: Scroll Reveal & Auto-Personalization
     ======================================================== -->
<script>
    (function(){
        // 1. Pre-Fill logic based on URL ?guest=Name
        const gName = new URLSearchParams(window.location.search).get('guest');
        if(gName) {
            let nInp = document.getElementById('frmName');
            if(nInp) { nInp.value = gName; }
        }

        // 2. Cinematic Entrance Trigger using modern Observer
        const formObs = new IntersectionObserver((entries) => {
            if(entries[0].isIntersecting) {
                document.getElementById('glassFormTarget').classList.add('reveal');
                formObs.disconnect();
            }
        }, { threshold: 0.2 });
        formObs.observe(document.getElementById('rsvpFormAnchor'));
    })();
</script>
