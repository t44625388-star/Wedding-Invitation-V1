<!-- ========================================================
     GALLERY COMPONENT - "THE EDITORIAL MASONRY VAULT"
     ======================================================== -->

<style>
    /* ======================================================
       1. GLOBAL SECTION CONTAINER & TEXTURE
       ====================================================== */
    .vault-section {
        position: relative; width: 100vw; background: #010204;
        padding: clamp(80px, 12vh, 150px) 0; overflow: hidden;
        color: white; display: flex; flex-direction: column; align-items: center;
    }
    
    .vault-section::before {
        content: ''; position: absolute; inset: 0; pointer-events: none; opacity: 0.15;
        background: radial-gradient(ellipse at center, rgba(84, 115, 145, 0.1) 0%, transparent 60%); z-index: 1;
    }

    /* ======================================================
       2. TYPOGRAPHY: THE TITLE SECTION
       ====================================================== */
    .vt-title {
        position: relative; z-index: 10; text-align: center; margin-bottom: clamp(60px, 10vh, 100px);
        opacity: 0; transform: translateY(40px); transition: all 1s ease;
    }
    .vault-section.unlocked .vt-title { opacity: 1; transform: translateY(0); }
    
    .vt-h-script { font-family: 'Great Vibes', cursive; font-size: clamp(3.5rem, 6vw, 4.5rem); color: #ebd197; line-height: 1; margin: 0; }
    .vt-h-sub { font-family: 'Cinzel', serif; font-size: clamp(0.75rem, 1.5vw, 0.9rem); color: rgba(255,255,255,0.4); letter-spacing: 8px; text-transform: uppercase; margin-top: 10px; }

    /* ======================================================
       3. THE OFFSET EDITORIAL GRID 
       ====================================================== */
    .vault-grid {
        position: relative; z-index: 10; width: 90%; max-width: 1400px;
        display: grid; 
        grid-template-columns: repeat(3, 1fr);
        gap: clamp(15px, 2vw, 30px);
    }
    
    /* Complex media querying for elegant stacking */
    @media (max-width: 900px) { .vault-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .vault-grid { grid-template-columns: 1fr; gap: 40px; width: 85%; } }

    /* Individual Masonry Wrapping Frame */
    .v-frame {
        position: relative; width: 100%; border-radius: 8px; overflow: hidden;
        background: #050a11; border: 1px solid rgba(255, 235, 161, 0.05);
        cursor: pointer;
        /* The Parallax Hover Transform baseline */
        transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.6s ease;
        /* Start hidden waiting for scroll Observer */
        opacity: 0; transform: translateY(80px);
    }
    
    /* Reveal Animation controlled by JS staggered indices */
    .vault-section.unlocked .v-frame.reveal { opacity: 1; transform: translateY(0); }

    /* The "Vogue" Style staggered Offset Trickery (middle col goes down, outside cols go up etc) */
    @media (min-width: 900px) {
        .v-frame:nth-child(3n+2) { margin-top: 80px; } /* Center Column pushed down */
        .v-frame:nth-child(3n+3) { margin-top: -30px; } /* Right Column pulled up */
        .v-frame:nth-child(3n+1) { margin-bottom: 50px; } /* Left Column extra base space */
    }
    @media (max-width: 899px) and (min-width: 601px) {
        .v-frame:nth-child(even) { margin-top: 60px; } /* Just stagger alternates on Tablet */
    }

    /* Variable Heights creating the visual broken-wall flow */
    .vh-tall { aspect-ratio: 3/4.5; }
    .vh-squarish { aspect-ratio: 4/4; }
    .vh-cinematic { aspect-ratio: 16/10; }

    /* ======================================================
       4. ADVANCED PHOTO FILTER & LENS INTERACTION 
       ====================================================== */
    .v-photo {
        width: 100%; height: 100%; object-fit: cover;
        /* Heavy Filter Default State */
        filter: grayscale(80%) sepia(20%) brightness(0.6) contrast(1.2);
        transform: scale(1.02); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    
    /* When frame gets hovered: 
       The Picture turns full color, sharp, pushes inward slightly. Frame pulls outward entirely. 
       This reverses physics in the browser adding immense realistic 3D. 
    */
    .v-frame:hover {
        transform: translateY(-10px) scale(1.02) !important;
        box-shadow: 0 25px 50px rgba(0,0,0,0.9), 0 0 20px rgba(212,163,115,0.15);
        border-color: rgba(212,163,115,0.3); z-index: 100;
    }
    .v-frame:hover .v-photo {
        filter: grayscale(0%) sepia(0%) brightness(1.1) contrast(1);
        transform: scale(1.1) rotate(0.5deg); /* Intense Macro zooming on picture hover */
    }

    /* Outer Vignette gradient frame that stays fixed above photo */
    .v-overlay-vignette {
        position: absolute; inset: 0; z-index: 2; pointer-events: none;
        background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 40%, rgba(0,0,0,0.5) 100%);
        transition: opacity 0.5s;
    }
    .v-frame:hover .v-overlay-vignette { opacity: 0.6; }

    /* ======================================================
       5. EMBELLISHED EDITORIAL TAGS (Plaques)
       ====================================================== */
    .v-tag {
        position: absolute; bottom: 20px; left: 20px; z-index: 5;
        background: rgba(1, 2, 4, 0.6); backdrop-filter: blur(10px);
        padding: 8px 15px; border-radius: 4px; border-left: 2px solid #d4a373;
        transform: translateX(-20px); opacity: 0;
        transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .v-frame:hover .v-tag { transform: translateX(0); opacity: 1; }
    
    .v-tag span { display: block; }
    .vt-sub { font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 2px; color: #cbd5e1; }
    .vt-main { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 500; color: #ebd197; text-transform: uppercase; margin-top: 2px; letter-spacing: 1px;}
</style>

<!-- ========================================================

<!-- ========================================================
     LOGIC: STAGGERED FLIP ANIMATIONS & CURSOR AESTHETIC
     ======================================================== -->
<script>
    (function(){
        // 1. Initial Pop In Sequence Watcher
        const trigBlock = document.getElementById('vaultTrigTarget');
        const f_cards = document.querySelectorAll('.v-frame');
        
        const glObs = new IntersectionObserver((entries) => {
            if(entries[0].isIntersecting) {
                // Instantly unlocks container so titles can show
                trigBlock.classList.add('unlocked');
                
                // Loops through exactly how a gallery populates. Image 1 to image 6 sequence cascading down nicely
                f_cards.forEach((frame, idx) => {
                    setTimeout(() => { frame.classList.add('reveal'); }, (idx * 250) + 400 );
                });
                glObs.disconnect(); // Runs only once during page load
            }
        }, { threshold: 0.1 });
        glObs.observe(trigBlock);

        // 2. [Bonus UX] Optional Viewfinder interactive dot expanding only on PC non-touch displays (For 100% Agency Quality Effect)
        if(window.matchMedia("(hover: hover)").matches) {
            const sysRing = document.getElementById('cursorRing'); // Connecting to global Ring cursor created inside Index previously
            const sysDot = document.getElementById('cursorDot'); 

            f_cards.forEach(box => {
                // Shrink and snap UI rings magically on these beautiful photo panels 
                box.addEventListener('mouseenter', () => {
                    if(sysRing) {
                        sysRing.style.width = '70px'; sysRing.style.height = '70px';
                        sysRing.style.borderColor = 'rgba(212,163,115,0.9)'; sysRing.style.backgroundColor = 'rgba(0,0,0,0.3)';
                        sysRing.style.mixBlendMode = 'overlay'; 
                    }
                    if(sysDot) sysDot.style.display = 'none'; // remove inner annoying dot
                });
                
                // Leave restore physics
                box.addEventListener('mouseleave', () => {
                    if(sysRing) {
                        sysRing.style.width = '35px'; sysRing.style.height = '35px';
                        sysRing.style.borderColor = 'rgba(212,163,115,0.5)'; sysRing.style.backgroundColor = 'transparent';
                        sysRing.style.mixBlendMode = 'normal';
                    }
                    if(sysDot) sysDot.style.display = 'block'; 
                });
            });
        }
    })();
</script>
