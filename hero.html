<!-- ========================================================
     HERO COMPONENT - "THE VOLUMETRIC APEX"
     ======================================================== -->

<style>
    /* ======================================================
       1. GLOBAL HERO STAGE
       ====================================================== */
    .hero-zenith {
        position: relative; width: 100vw; height: 100vh;
        background: #010204; overflow: hidden;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        
        /* Master Orchestration Times */
        --h-wait: 1.8s;     /* Wait for 3D doors to finish swinging */
        --h-light: 2.3s;    /* Lights on */
        --h-text: 3.2s;     /* Grand text assembly */
    }

    /* ======================================================
       2. OPTICAL LENS BACKGROUND & CHROMATIC FRINGE
       ====================================================== */
    .hz-bg {
        position: absolute; top: -5%; left: -5%; width: 110%; height: 110%; z-index: 1;
        background: url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
        /* Start with zero light, high blur, and extreme scale */
        filter: brightness(0) blur(40px) contrast(1.5); transform: scale(1.3);
        animation: 
            lensFocus 3.5s cubic-bezier(0.25, 1, 0.5, 1) forwards calc(var(--h-wait) + 0.1s),
            microDrift 40s linear infinite forwards calc(var(--h-wait) + 3.6s);
    }
    
    .hz-vignette {
        position: absolute; inset: 0; z-index: 2; pointer-events: none;
        background: radial-gradient(circle at 50% 50%, rgba(2, 4, 8, 0.2) 10%, rgba(0, 0, 0, 0.95) 90%);
        box-shadow: inset 0 0 100px #000; /* Edge crushing */
    }

    @keyframes lensFocus { 100% { filter: brightness(0.65) blur(0px) contrast(1); transform: scale(1); } }
    @keyframes microDrift { 100% { transform: scale(1.1) translate(10px, 10px); } }

    /* ======================================================
       3. VOLUMETRIC "GOD RAYS" & GOLDEN SILK
       ====================================================== */
    /* Light beams piercing through the ceiling */
    .hz-god-rays {
        position: absolute; top: -50%; left: 50%; transform: translateX(-50%);
        width: 150vw; height: 150vh; z-index: 3; pointer-events: none;
        /* Conic gradient creates realistic sharp rays */
        background: conic-gradient(from 180deg at 50% -20%, transparent 40%, rgba(255,235,161,0.06) 45%, transparent 50%, rgba(212,163,115,0.03) 55%, transparent 60%);
        filter: blur(15px); mix-blend-mode: screen; opacity: 0;
        animation: raysReveal 3s ease forwards var(--h-light), raySway 15s ease-in-out infinite alternate;
    }
    @keyframes raysReveal { 100% { opacity: 1; } }
    @keyframes raySway { 0% { transform: translateX(-50%) rotate(-5deg); } 100% { transform: translateX(-50%) rotate(5deg); } }

    /* Fluid Liquid Silk Layer */
    .hz-silk {
        position: absolute; bottom: 20%; left: -20%; width: 100vw; height: 40vh; z-index: 4; pointer-events: none;
        background: linear-gradient(90deg, transparent, rgba(212, 163, 115, 0.08), rgba(255, 235, 161, 0.03), transparent);
        border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        filter: blur(40px); mix-blend-mode: screen; opacity: 0;
        animation: silkUnveil 4s forwards calc(var(--h-light) + 1s), silkMelt 20s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
    }
    @keyframes silkUnveil { 100% { opacity: 1; } }
    @keyframes silkMelt { 100% { transform: translateX(40vw) scale(1.2) rotate(15deg); border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; } }

    /* ======================================================
       4. HUGE MONOGRAM WALL (Grand Depth Element)
       ====================================================== */
    .hz-monogram-wall {
        position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); z-index: 2;
        font-family: 'Great Vibes', cursive; font-size: clamp(20rem, 55vw, 55rem);
        color: transparent; -webkit-text-stroke: 1px rgba(212, 163, 115, 0.05); /* Ghost wireframe text */
        line-height: 1; white-space: nowrap; pointer-events: none; user-select: none;
        filter: blur(10px); opacity: 0;
        animation: wallReveal 4s cubic-bezier(0.16, 1, 0.3, 1) forwards calc(var(--h-light) + 0.5s);
    }
    @keyframes wallReveal { 100% { filter: blur(3px); opacity: 1; } }

    /* ======================================================
       5. INTERACTIVE 3D CONTENT HUB & CHROMATIC TEXT
       ====================================================== */
    .hz-stage {
        position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; text-align: center;
        perspective: 1200px; transform-style: preserve-3d; width: 100%; padding: 0 5%;
    }

    /* VIP Text with Golden Reveal */
    .hz-guest {
        font-family: 'Cinzel', serif; font-size: clamp(0.7rem, 1.2vw, 0.8rem);
        color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase;
        transform: translateY(20px); opacity: 0; filter: blur(5px);
        animation: ghostIn 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards var(--h-text);
    }
    .hz-guest span { color: #ebd197; font-weight: 600; text-shadow: 0 0 10px rgba(235, 209, 151, 0.4); }

    /* --- THE MAGNIFICENT COUPLE NAME (Tracking & Prism Fix) --- */
    .hz-mega-title {
        font-family: 'Great Vibes', cursive; font-size: clamp(4.5rem, 11vw, 9.5rem);
        margin: -5px 0 10px 0; line-height: 1.1; white-space: nowrap;
        
        /* The Metallic Fill */
        background: linear-gradient(135deg, #fffdf8 0%, #ebd197 30%, #a67c00 70%, #ebd197 100%);
        background-size: 200% auto; -webkit-background-clip: text; color: transparent;
        
        /* CHROMATIC ABERRATION FAUX SHADOW (The Luxury Prism Defect) */
        filter: 
            drop-shadow(-2px 0 0px rgba(255,0,0,0.4)) 
            drop-shadow(2px 0 0px rgba(0,255,255,0.4)) 
            drop-shadow(0 20px 30px rgba(0,0,0,0.8));
        
        /* Tracking Evolution Engine */
        letter-spacing: -20px; /* Highly squished initially */
        opacity: 0; filter: blur(15px) brightness(300%); transform: scale(0.9);
        animation: 
            grandeurExpand 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards calc(var(--h-text) + 0.3s),
            metalSweep 6s linear infinite calc(var(--h-text) + 3s);
    }

    @keyframes ghostIn { 100% { opacity: 1; transform: translateY(0); filter: blur(0); letter-spacing: 6px;} }
    
    @keyframes grandeurExpand {
        100% { 
            letter-spacing: normal; opacity: 1; filter: blur(0) brightness(1) drop-shadow(-1px 0 0px rgba(255,0,0,0.2)) drop-shadow(1px 0 0px rgba(0,255,255,0.2)) drop-shadow(0 20px 30px rgba(0,0,0,0.9)); 
            transform: scale(1); 
        }
    }
    @keyframes metalSweep { 100% { background-position: 200% center; } }

    /* ======================================================
       6. SVG ARTISANAL FLOURISH (The Handwritten underline)
       ====================================================== */
    .hz-flourish {
        width: clamp(150px, 40vw, 350px); height: auto;
        stroke: #d4a373; stroke-width: 2; fill: none;
        stroke-linecap: round; stroke-linejoin: round;
        /* Draw Magic variables */
        stroke-dasharray: 1000; stroke-dashoffset: 1000;
        animation: svgDraw 2.5s cubic-bezier(0.7, 0, 0.3, 1) forwards calc(var(--h-text) + 1.2s);
        filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
    }
    @keyframes svgDraw { 100% { stroke-dashoffset: 0; } }

    .hz-date {
        font-family: 'Montserrat', sans-serif; font-size: clamp(0.7rem, 1.2vw, 0.8rem); color: rgba(255,255,255,0.6);
        letter-spacing: 8px; text-transform: uppercase; margin-top: 15px; font-weight: 300;
        opacity: 0; transform: translateY(-10px);
        animation: elegantWipe 1.5s ease forwards calc(var(--h-text) + 2s);
    }
    @keyframes elegantWipe { 100% { opacity: 1; transform: translateY(0); } }

    /* ======================================================
       7. ATMOSPHERIC BOKEH (Mouse Reactive System)
       ====================================================== */
    .hz-bokeh-field {
        position: absolute; inset: 0; z-index: 8; overflow: hidden; pointer-events: none;
    }
    .hz-b-dust {
        position: absolute; border-radius: 50%;
        background: radial-gradient(circle, rgba(255,235,161,0.9) 0%, rgba(212,163,115,0.4) 40%, transparent 100%);
        /* Box shadow acts as the blurred glowing halo */
        box-shadow: 0 0 15px rgba(255,235,161,0.5);
        opacity: 0; transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        /* Controlled fully via JS array injecting animations */
    }

    /* SCROLL HINT */
    .hz-dive-btn {
        position: absolute; bottom: 6%; left: 50%; transform: translateX(-50%); z-index: 20;
        display: flex; flex-direction: column; align-items: center; opacity: 0;
        animation: ghostIn 2s forwards calc(var(--h-text) + 3.5s); cursor: pointer; transition: all 0.3s;
    }
    .hz-dive-btn:hover { transform: translateX(-50%) translateY(10px); }
    .hz-dive-txt { font-family: 'Cinzel', serif; font-size: 0.65rem; color: rgba(212,163,115,0.7); letter-spacing: 4px; margin-bottom: 10px; transition: color 0.3s;}
    .hz-dive-btn:hover .hz-dive-txt { color: white; letter-spacing: 6px;}
    .hz-dive-line { width: 1px; height: 5vh; background: linear-gradient(to bottom, #d4a373, transparent); position: relative; }
</style>

<!-- ========================================================
     THE LUXURY HTML STAGE
     ======================================================== -->
<div class="hero-zenith" id="hzEngine">
    
    <!-- Depth Universe -->
    <div class="hz-bg"></div>
    <div class="hz-vignette"></div>

    <!-- Volumetric Light Layer -->
    <div class="hz-god-rays"></div>
    <div class="hz-silk"></div>

    <!-- Giant spatial architectural text -->
    <div class="hz-monogram-wall">E&J</div>

    <!-- Live Reactive Bokeh System -->
    <div class="hz-bokeh-field" id="hzBokehArea"></div>

    <!-- The Core Magnetic Stage -->
    <div class="hz-stage" id="hzTracker">
        
        <div class="hz-guest" id="vipWelcomePlate">With joy, we welcome you</div>
        
        <!-- Extruding Tracking Name with Chromatic edges -->
        <h1 class="hz-mega-title">Emma & James</h1>
        
        <!-- Artisanal Signature SVG Line Draw -->
        <svg class="hz-flourish" viewBox="0 0 500 50">
            <!-- A beautiful elegant curly stroke mimicking a hand-drawn golden pen -->
            <path d="M50 25 Q 150 5 250 25 T 450 25" />
            <!-- Tiny leaf / diamond drawn in center -->
            <path d="M 245 25 L 250 15 L 255 25 L 250 35 Z" fill="#d4a373" stroke="none" />
        </svg>

        <div class="hz-date">15 September 2024 <b style="color:#d4a373; margin:0 15px;">|</b> Tuscany</div>
    </div>

    <!-- Enter Trigger -->
    <div class="hz-dive-btn" onclick="window.scrollBy({top: window.innerHeight, behavior: 'smooth'});">
        <div class="hz-dive-txt">ENTER</div>
        <div class="hz-dive-line"></div>
    </div>

</div>

<!-- ========================================================
     JAVASCRIPT: REACTIVE ENGINE & PHYSICS
     ======================================================== -->
<script>
    (function(){
        /* ----------------------------------------------------
           1. VIP PERSONALIZATION INJECTOR
           ---------------------------------------------------- */
        const queryName = new URLSearchParams(window.location.search).get('guest');
        if(queryName) {
            document.getElementById('vipWelcomePlate').innerHTML = `OUR JOURNEY BEGINS WITH YOU, <span>${queryName.toUpperCase()}</span>`;
        }

        /* ----------------------------------------------------
           2. ORGANIC ATMOSPHERIC BOKEH (Reacts to depths)
           ---------------------------------------------------- */
        const field = document.getElementById('hzBokehArea');
        const particleArray = [];
        
        for(let i=0; i<35; i++) {
            let p = document.createElement('div');
            p.className = 'hz-b-dust';
            
            // Random properties generating pure organic chaos
            let pSize = Math.random() * 8 + 2; // Size between 2px to 10px
            p.style.width = pSize + "px";
            p.style.height = pSize + "px";
            
            // Placements
            let pX = Math.random() * 100;
            let pY = Math.random() * 100;
            p.style.left = pX + "vw";
            p.style.top = pY + "vh";
            
            // Creating massive Depth of Field blur for big ones, sharp for tiny ones
            let depthBlur = (pSize > 6) ? 5 : (pSize < 4 ? 0 : 2);
            p.style.filter = `blur(${depthBlur}px)`;
            
            // Base rising animation creation attached dynamically 
            let animDur = Math.random() * 8 + 5; 
            let animDelay = Math.random() * 4 + 4; // Waitting till text resolves
            
            // Insert custom keyframes specifically for this dust via dynamic inline styling logic mapped natively
            p.style.animation = `heroDropTitle ${animDur}s ease-in-out infinite alternate ${animDelay}s`;
            p.style.opacity = (Math.random() * 0.5 + 0.1); // Extremely low raw opacity to just glow!
            
            // Saving data node into memory arrays to manipulate via Mouse Magnetic effects later
            particleArray.push({ node: p, ox: pX, oy: pY, speedZ: (Math.random() * 2 + 0.5) });
            field.appendChild(p);
        }

        /* ----------------------------------------------------
           3. VOLUMETRIC MAGNETIC PARALLAX ENGINE
           ---------------------------------------------------- */
        if(window.matchMedia("(hover: hover)").matches) {
            const EngineCore = document.getElementById('hzEngine');
            const CanvasText = document.getElementById('hzTracker');
            const GlassSilk = document.querySelector('.hz-silk');

            EngineCore.addEventListener('mousemove', (e) => {
                // Determine Delta (Force applied based on center of Screen distance)
                let cX = window.innerWidth / 2;
                let cY = window.innerHeight / 2;
                let forceX = (e.clientX - cX) / cX; 
                let forceY = (e.clientY - cY) / cY;

                // 1. Text Bends INTO the screen
                CanvasText.style.transform = `rotateY(${forceX * 5}deg) rotateX(${forceY * -5}deg) translateZ(40px)`;
                
                // 2. Liquid Silk pushes drastically far OPPOSITE generating insane tactile layered visual 
                GlassSilk.style.transform = `translate(${forceX * -60}px, ${forceY * -60}px) scale(1.2)`;

                // 3. Bokeh Particles act individually causing Multi-Layer-Depth Illusion!
                particleArray.forEach(pt => {
                    // Larger particles (foreground) shift radically fast! Tiner back ones hardly move.
                    let shfX = (forceX * -150) / pt.speedZ;
                    let shfY = (forceY * -150) / pt.speedZ;
                    pt.node.style.transform = `translate(${shfX}px, ${shfY}px)`;
                });
            });

            EngineCore.addEventListener('mouseleave', () => {
                // Restore Natural Gravities smoothly with established internal CSS transiton triggers 
                CanvasText.style.transform = `rotateY(0deg) rotateX(0deg) translateZ(0px)`;
                GlassSilk.style.transform = `translate(0, 0) scale(1.2)`;
                particleArray.forEach(pt => pt.node.style.transform = `translate(0, 0)`);
            });
        }
    })();
</script>
